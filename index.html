  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px\">Software hands you a database. We hand you results.<\u002Fh2>\n        <div style=\"border:1px solid #e6e3dc;border-radius:16px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1fr;background:#0b1a2e;color:#fff\">\n            <div style=\"padding:18px 26px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px\"><\u002Fdiv>\n            <div style=\"padding:18px 26px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;color:#9fb0c2\">A SOFTWARE TOOL<\u002Fdiv>\n            <div style=\"padding:18px 26px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;color:#39bdec\">AMORECREATIVES<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ compareRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1fr;border-top:1px solid #efece5;background:#fff\">\n              <div style=\"padding:18px 26px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#0b1a2e\">{{ r.label }}<\u002Fdiv>\n              <div style=\"padding:18px 26px;font-size:14.5px;color:#7a838f;border-left:1px solid #f0ede6\">{{ r.saas }}<\u002Fdiv>\n              <div style=\"padding:18px 26px;font-size:14.5px;color:#1d2733;border-left:1px solid #f0ede6;font-weight:500\">{{ r.svc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:44px;display:flex;justify-content:center\">\n          <div onclick=\"{{ goContact }}\" style=\"font-family:'Sora',sans-serif;font-size:15px;font-weight:600;padding:16px 32px;border-radius:9px;background:#0b1a2e;color:#fff;cursor:pointer;display:flex;align-items:center;gap:10px\">Start a Campaign <span style=\"color:#39bdec\">→<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ NETWORK ============ -->\n    <sc-if value=\"{{ isNetwork }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <section style=\"max-width:1180px;margin:0 auto;padding:96px 40px 56px\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:12px;letter-spacing:2px;color:#1f9fd1;text-transform:uppercase;margin-bottom:18px\">Our Network<\u002Fdiv>\n        <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:52px;line-height:1.12;letter-spacing:-0.8px;color:#0b1a2e;max-width:760px;text-wrap:balance\">Hand-picked creators across the niches that matter to your brand.<\u002Fh1>\n        <p style=\"font-size:18px;line-height:1.6;color:#4a5563;margin-top:24px;max-width:620px\">We hold direct relationships as community moderators — so reach is warm, not cold. Below is a representative snapshot. Named profiles and rate cards are shared with qualified brands under NDA.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"max-width:1180px;margin:0 auto;padding:0 40px 40px\">\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n          <sc-for list=\"{{ networkStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6e3dc;border-radius:16px;padding:24px 24px 26px;min-height:212px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 20px 44px -26px rgba(11,26,46,0.4);border-color:#d4d0c7\" data-comment-anchor=\"07e6d53492-div\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n                <div style=\"font-family:'Sora',sans-serif;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:#1f9fd1;font-weight:600\">{{ st.kicker }}<\u002Fdiv>\n                <div style=\"font-family:'Newsreader',serif;font-size:14px;color:#c8cdd4;letter-spacing:0.5px\">{{ st.idx }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:auto;display:flex;align-items:baseline;gap:8px\">\n                <div style=\"font-family:'Newsreader',serif;font-size:34px;color:#0b1a2e;line-height:1.02;letter-spacing:-1px\">{{ st.value }}<\u002Fdiv>\n                <div style=\"font-family:'Sora',sans-serif;font-size:13px;color:#9aa1ab;font-weight:500\">{{ st.unit }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:26px;height:2px;background:#1f9fd1;margin:13px 0 11px\"><\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#5e6873;line-height:1.45\">{{ st.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"max-width:1180px;margin:0 auto;padding:48px 40px 100px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px\">\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:28px;letter-spacing:-0.4px;color:#0b1a2e\">Niche coverage<\u002Fh2>\n          <div style=\"font-family:'Sora',sans-serif;font-size:12.5px;color:#8a909a;letter-spacing:0.3px\">Snapshot · profiles available on request<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e3dc;border-radius:16px;overflow:hidden;background:#fff\">\n          <div style=\"display:grid;grid-template-columns:1.4fr 0.8fr 1fr 1fr 1.6fr;background:#f0eee7;border-bottom:1px solid #e6e3dc\">\n            <div style=\"padding:15px 24px;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:1px;color:#7a838f\">NICHE<\u002Fdiv>\n            <div style=\"padding:15px 18px;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:1px;color:#7a838f\">TIER<\u002Fdiv>\n            <div style=\"padding:15px 18px;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:1px;color:#7a838f\">FOLLOWERS<\u002Fdiv>\n            <div style=\"padding:15px 18px;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:1px;color:#7a838f\">PLATFORM<\u002Fdiv>\n            <div style=\"padding:15px 24px;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:1px;color:#7a838f\">AUDIENCE<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ roster }}\" as=\"row\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid;grid-template-columns:1.4fr 0.8fr 1fr 1fr 1.6fr;border-top:1px solid #f0ede6\" style-hover=\"background:#faf9f6\">\n              <div style=\"padding:17px 24px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#0b1a2e\">{{ row.niche }}<\u002Fdiv>\n              <div style=\"padding:17px 18px;font-size:14px;color:#56606d;display:flex;align-items:center\">{{ row.tier }}<\u002Fdiv>\n              <div style=\"padding:17px 18px;font-size:14px;color:#56606d;display:flex;align-items:center\">{{ row.range }}<\u002Fdiv>\n              <div style=\"padding:17px 18px;font-size:14px;color:#56606d;display:flex;align-items:center\">{{ row.platform }}<\u002Fdiv>\n              <div style=\"padding:17px 24px;font-size:14px;color:#56606d;display:flex;align-items:center\">{{ row.audience }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:42px;background:#0b1a2e;border-radius:18px;padding:44px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px\">\n          <div style=\"max-width:520px\">\n            <div style=\"font-family:'Newsreader',serif;font-size:26px;color:#fff;line-height:1.25;letter-spacing:-0.4px\">Want the full roster with named profiles and engagement rates?<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ goContact }}\" style=\"font-family:'Sora',sans-serif;font-size:15px;font-weight:600;padding:15px 28px;border-radius:9px;background:#fff;color:#0b1a2e;cursor:pointer;white-space:nowrap\">Request Access<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ CONTACT ============ -->\n    <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <section style=\"max-width:760px;margin:0 auto;padding:120px 40px 130px;text-align:center;position:relative\">\n        <div style=\"position:absolute;top:96px;left:50%;transform:translateX(-50%);width:320px;height:320px;border:1px solid #e0ddd5;border-radius:50%;opacity:0.6\"><\u002Fdiv>\n        <div style=\"position:relative\">\n          <div style=\"font-family:'Sora',sans-serif;font-size:12px;letter-spacing:2px;color:#1f9fd1;text-transform:uppercase;margin-bottom:20px\">Contact<\u002Fdiv>\n          <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:52px;line-height:1.1;letter-spacing:-0.8px;color:#0b1a2e;text-wrap:balance\">Let's scope your next campaign.<\u002Fh1>\n          <p style=\"font-size:18px;line-height:1.6;color:#4a5563;margin-top:24px;max-width:480px;margin-left:auto;margin-right:auto\">Send us a note about your brand and goals. We'll come back within two business days with a recommended approach.<\u002Fp>\n          <div style=\"margin-top:40px;display:flex;justify-content:center\">\n            <a href=\"{{ mailto }}\" style=\"font-family:'Sora',sans-serif;font-size:15px;font-weight:600;padding:17px 34px;border-radius:10px;background:#0b1a2e;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:11px\" style-hover=\"background:#13263d\">Email Us <span style=\"color:#39bdec\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n          <div style=\"margin-top:22px;font-family:'Sora',sans-serif;font-size:15px;color:#5a6573\">\n            or write directly to <a href=\"{{ mailto }}\" style=\"color:#0b1a2e;font-weight:600;border-bottom:1px solid #cbd0d6\" style-hover=\"color:#1f9fd1\">{{ email }}<\u002Fa>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:56px;padding-top:40px;border-top:1px solid #e6e3dc;max-width:440px;margin-left:auto;margin-right:auto;text-align:left\">\n            <div style=\"font-family:'Sora',sans-serif;font-size:13px;letter-spacing:1px;color:#8a909a;font-weight:600;margin-bottom:16px;text-align:center\">HELPFUL TO INCLUDE<\u002Fdiv>\n            <sc-for list=\"{{ contactBullets }}\" as=\"b\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:12px;padding:9px 0;color:#46505c;font-size:15px;line-height:1.5\">\n                <span style=\"color:#1f9fd1;flex:none\">✶<\u002Fspan>{{ b }}\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!--PAGES_END-->\n  <\u002Fmain>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0b1a2e;color:#fff\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:54px 40px 40px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:30px\">\n      <div style=\"display:flex;align-items:center;gap:13px\">\n        <div style=\"width:42px;height:42px;border:1.5px solid rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex:none\">\n          <span style=\"font-family:'Newsreader',serif;font-size:21px;font-weight:500;letter-spacing:-1.5px;color:#fff\">AC<\u002Fspan>\n          <span style=\"position:absolute;top:3px;right:5px;color:#39bdec;font-size:9px;line-height:1\">✶<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Sora',sans-serif;font-size:14px;letter-spacing:3.5px;font-weight:600;line-height:1\">AMORE<\u002Fdiv>\n          <div style=\"font-size:8px;letter-spacing:4px;color:#39bdec;margin-top:2px\">CREATIVES<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right\">\n        <a href=\"{{ mailto }}\" style=\"font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:#fff\" style-hover=\"color:#39bdec\">{{ email }}<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,0.08)\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:20px 40px;font-size:12.5px;color:#6b7686\">© 2026 Amorecreatives LLC. All rights reserved.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { page: 'home', sent: false };\n\n  go(p){ this.setState({ page: p }); if (typeof window!=='undefined') window.scrollTo(0,0); }\n\n  renderVals(){\n    const page = this.state.page;\n    const mk = (id,label) => {\n      const active = page===id;\n      return { label, go: ()=>this.go(id), color: active ? '#0b1a2e' : '#5a6573', bg: active ? '#eceae3' : 'transparent' };\n    };\n    return {\n      page,\n      isHome: page==='home',\n      isServices: page==='services',\n      isNetwork: page==='network',\n      isContact: page==='contact',\n      goHome: ()=>this.go('home'),\n      goServices: ()=>this.go('services'),\n      goNetwork: ()=>this.go('network'),\n      goContact: ()=>this.go('contact'),\n      email: 'contact' + '@' + 'amorecreatives.com',\n      mailto: 'mail' + 'to:' + 'contact' + '@' + 'amorecreatives.com',\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      submit: ()=>{ this.setState({ sent: true }); if (typeof window!=='undefined') window.scrollTo(0,0); },\n      networkStats: [\n        { idx:'01', kicker:'Coverage', value:'8+', unit:'niches', label:'Core niches actively covered' },\n        { idx:'02', kicker:'Reach tiers', value:'10K–1M+', unit:'reach', label:'From micro to macro creators' },\n        { idx:'03', kicker:'Relationships', value:'Direct', unit:'', label:'Warm intros, not cold DMs' },\n        { idx:'04', kicker:'Access', value:'NDA', unit:'', label:'Full profiles shared securely' }\n      ],\n      navItems: [ mk('home','Home'), mk('services','Services'), mk('network','Our Network'), mk('contact','Contact') ],\n      todayList: [\n        'You source and screen every influencer yourself',\n        'You write and send all the outreach',\n        'You negotiate rates and chase contracts',\n        'You coordinate product and track deliverables',\n        'You compile the reporting at the end'\n      ],\n      usList: [\n        'We source and screen against your brief',\n        'We run outreach and negotiation for you',\n        'We handle contracting end to end',\n        'We coordinate product and manage the campaign',\n        'We deliver a clean final report'\n      ],\n      handleItems: [\n        { num:'01', title:'Influencer Sourcing & Screening', desc:'We hand-pick creators whose followers match your target customer and check each one for real engagement.' },\n        { num:'02', title:'Outreach & Negotiation', desc:'We make first contact and negotiate rates on your behalf.' },\n        { num:'03', title:'Contract Management', desc:'Agreements drafted, sent and tracked through to signature.' },\n        { num:'04', title:'Product Coordination', desc:'Product gifting, shipping and delivery timing handled for every creator.' },\n        { num:'05', title:'Campaign Management', desc:'Briefs, approvals and go-live managed day to day.' },\n        { num:'06', title:'Deliverable Tracking & Reporting', desc:'Every post verified, every metric captured in one report.' }\n      ],\n      steps: [\n        { n:'01', title:'Strategy Call', desc:'We align on goals, audience and budget.' },\n        { n:'02', title:'Influencer Matching', desc:'We build a shortlist from our curated network.' },\n        { n:'03', title:'Outreach & Negotiation', desc:'We make contact and agree rates.' },\n        { n:'04', title:'Contracting', desc:'Deliverables and usage locked in writing.' },\n        { n:'05', title:'Product Coordination', desc:'Seeding and shipping handled for every creator.' },\n        { n:'06', title:'Campaign Go-Live', desc:'Content reviewed, approved and published.' },\n        { n:'07', title:'Deliverable Tracking', desc:'Every post verified against the brief.' },\n        { n:'08', title:'Reporting', desc:'A single clear report on what the campaign did.' }\n      ],\n      compareRows: [\n        { label:'Influencer sourcing', saas:'You search the database', svc:'We build the shortlist' },\n        { label:'Outreach', saas:'You send the messages', svc:'We run all outreach' },\n        { label:'Negotiation', saas:'You agree the rates', svc:'We negotiate for you' },\n        { label:'Contracts', saas:'You manage paperwork', svc:'We handle contracting' },\n        { label:'Product & logistics', saas:'You coordinate it', svc:'We coordinate it' },\n        { label:'Tracking & reporting', saas:'You chase and compile', svc:'We deliver the report' }\n      ],\n      roster: [\n        { niche:'Fitness & Wellness', tier:'Mid', range:'100K–500K', platform:'Instagram', audience:'Primary: US women 25–34' },\n        { niche:'Beauty & Skincare', tier:'Macro', range:'500K+', platform:'TikTok', audience:'Primary: US women 18–29' },\n        { niche:'Parenting', tier:'Micro', range:'10K–100K', platform:'Instagram', audience:'Primary: US parents 28–40' },\n        { niche:'Tech & Gadgets', tier:'Mid', range:'100K–500K', platform:'YouTube', audience:'Primary: US men 22–38' },\n        { niche:'Food & Lifestyle', tier:'Micro', range:'10K–100K', platform:'Instagram', audience:'Primary: US adults 25–44' },\n        { niche:'Fashion', tier:'Macro', range:'500K+', platform:'TikTok', audience:'Primary: US women 18–30' },\n        { niche:'Home & Living', tier:'Mid', range:'100K–500K', platform:'Instagram', audience:'Primary: US women 30–45' },\n        { niche:'Travel', tier:'Micro', range:'10K–100K', platform:'YouTube', audience:'Primary: US adults 25–40' }\n      ],\n      contactBullets: [\n        'Your brand / product category',\n        'Campaign type (awareness, product launch, affiliate, UGC)',\n        'Rough timeline and budget range',\n        'Influencer niche preferences'\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
